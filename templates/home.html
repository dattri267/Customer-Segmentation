<!DOCTYPE html>
<html>

<head>
    <title>Customer Segmentation</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;

            font-family: Arial, sans-serif;
        }

        .navbar {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            background: white;
            box-sizing: border-box;
        }

        .hero {
            position: relative;
            height: calc(100vh - 70px);

            display: flex;
            align-items: center;
            justify-content: center;

            background: url("{{ url_for('static', filename='customer-segmentation.png') }}") no-repeat center;
            background-size: cover;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
        }

        .hero-text {
            position: relative;
            z-index: 1;
            max-width: 600px;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .hero-text h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero-text p {
            font-size: 18px;
            margin: 20px 0;
        }

        .btn {
            background: #4f46e5;
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: #4338ca;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h2>Segmentation AI</h2>
    </div>

    <div class="hero">
        <div class="hero-text">
            <h1>Real-Time Customer Segmentation</h1>
            <p>
                Predict customer behavior based on income and spending patterns using machine learning.
            </p>

            <a href="/predict-page" class="btn">Start Prediction</a>
        </div>
    </div>

</body>

</html>
